<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опитування - Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">SurveyMaker</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                        <li class="nav-item"><a class="nav-link active" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container My-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Вхід до сайту</h2>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com">
                        </div>
                        <div class="mb-4">
                            <label for="loginPassword" class="form-label fw-bold">Пароль</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="Введіть пароль">
                        </div>
                        <div class="d-grid">
                            <button type="button" id="loginBtn" class="btn btn-primary btn-lg">Увійти</button>
                        </div>
                        <div class="text-center mt-3">
                            <small>Немає акаунта? <a href="register.html" class="text-decoration-none">Зареєструватися</a></small>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 SurveyMaker. Розроблено студенткою групи КВ-32 Чучвагою Анастасією.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        class UserModel {
            getUsers() {
                const users = localStorage.getItem('users');
                return users ? JSON.parse(users) : [];
            }

            loginUser(email, password) {
                const users = this.getUsers();
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    return { success: true };
                }
                return { success: false, message: 'Неправильний Email або пароль!' };
            }
        }

        class LoginView {
            constructor() {
                this.emailInput = document.getElementById('loginEmail');
                this.passwordInput = document.getElementById('loginPassword');
                this.loginBtn = document.getElementById('loginBtn');
            }

            bindLogin(handler) {
                if (!this.loginBtn) return;

                this.loginBtn.addEventListener('click', () => {
                    const email = this.emailInput.value.trim();
                    const password = this.passwordInput.value;

                    if (!email || !password) {
                        alert('Будь ласка, введіть Email та пароль.');
                        return;
                    }

                    handler(email, password);
                });
            }

            redirectToProfile() {
                window.location.href = 'profile.html';
            }
        }

        class LoginController {
            constructor(model, view) {
                this.model = model;
                this.view = view;

                this.view.bindLogin(this.handleLogin.bind(this));
            }

            handleLogin(email, password) {
                const result = this.model.loginUser(email, password);

                if (result.success) {
                    this.view.redirectToProfile();
                } else {
                    alert(result.message);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = new LoginController(new UserModel(), new LoginView());
        });
    </script>
</body>
</html>
