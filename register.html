<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опитування - Реєстрація</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">SurveyMaker</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link active" href="register.html">Реєстрація</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Реєстрація</h2>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="nameInput" class="form-label fw-bold">Ім'я</label>
                            <input type="text" class="form-control" id="nameInput" placeholder="Введіть ваше ім'я">
                        </div>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="emailInput" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="genderSelect" class="form-label fw-bold">Стать</label>
                            <select class="form-select" id="genderSelect">
                                <option selected disabled>Оберіть стать</option>
                                <option value="1">Жіноча</option>
                                <option value="2">Чоловіча</option>
                                <option value="3">Інше</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="dobInput" class="form-label fw-bold">Дата народження</label>
                            <input type="date" class="form-control" id="dobInput">
                        </div>
                        <div class="mb-3">
                            <label for="passwordInput" class="form-label fw-bold">Пароль</label>
                            <input type="password" class="form-control" id="passwordInput" placeholder="Введіть пароль">
                        </div>
                        <div class="mb-4">
                            <label for="confirmPasswordInput" class="form-label fw-bold">Підтвердження паролю</label>
                            <input type="password" class="form-control" id="confirmPasswordInput" placeholder="Повторіть пароль">
                        </div>
                        <div class="d-grid">
                            <button type="button" id="registerBtn" class="btn btn-primary btn-lg">Зареєструватися</button>
                        </div>
                        <div class="text-center mt-3">
                            <small>Вже є акаунт? <a href="login.html" class="text-decoration-none">Увійти</a></small>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 SurveyMaker. Розроблено студенткою групи КВ-32 Чучвагою Анастасією.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        class UserModel {
            getUsers() {
                const users = localStorage.getItem('users');
                return users ? JSON.parse(users) : [];
            }

            registerUser(name, email, gender, dob, password) {
                const users = this.getUsers();
                
                const userExists = users.some(user => user.email === email);
                if (userExists) {
                    return { success: false, message: 'Користувач з таким Email вже існує!' };
                }

                const newUser = {
                    id: Date.now(),
                    name: name,
                    email: email,
                    gender: gender,
                    dob: dob,
                    password: password
                };

                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                
                return { success: true };
            }
        }

        class RegisterView {
            constructor() {
                this.nameInput = document.getElementById('nameInput');
                this.emailInput = document.getElementById('emailInput');
                this.genderSelect = document.getElementById('genderSelect');
                this.dobInput = document.getElementById('dobInput');
                this.passwordInput = document.getElementById('passwordInput');
                this.confirmPasswordInput = document.getElementById('confirmPasswordInput');
                this.registerBtn = document.getElementById('registerBtn');
            }

            bindRegister(handler) {
                if (!this.registerBtn) return;
                
                this.registerBtn.addEventListener('click', () => {
                    const name = this.nameInput.value.trim();
                    const email = this.emailInput.value.trim();
                    const gender = this.genderSelect.value;
                    const dob = this.dobInput.value;
                    const password = this.passwordInput.value;
                    const confirmPassword = this.confirmPasswordInput.value;

                    if (!name || !email || !dob || !password || !confirmPassword || this.genderSelect.selectedIndex === 0) {
                        alert('Будь ласка, заповніть усі поля форми.');
                        return;
                    }

                    if (password !== confirmPassword) {
                        alert('Введені паролі не співпадають!');
                        return;
                    }

                    handler({ name, email, gender, dob, password });
                });
            }

            redirectToProfile() {
                window.location.href = 'profile.html';
            }
        }

        class RegisterController {
            constructor(model, view) {
                this.model = model;
                this.view = view;

                this.view.bindRegister(this.handleRegister.bind(this));
            }

            handleRegister(userData) {
                const result = this.model.registerUser(
                    userData.name,
                    userData.email,
                    userData.gender,
                    userData.dob,
                    userData.password
                );

                if (result.success) {
                    alert('Реєстрація пройшла успішно!');
                    this.view.redirectToProfile();
                } else {
                    alert(result.message);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = new RegisterController(new UserModel(), new RegisterView());
        });
    </script>
</body>
</html>
