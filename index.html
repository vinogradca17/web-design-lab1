<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опитування - Головна сторінка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">SurveyMaker</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Головна</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="mb-4 text-center">Створення нового опитування</h1>
                
                <div class="card shadow-sm mb-5">
                    <div class="card-body">
                        <form id="surveyForm">
                            <div class="mb-4">
                                <label for="questionInput" class="form-label fw-bold">Ваше запитання</label>
                                <input type="text" class="form-control form-control-lg" id="questionInput" placeholder="Наприклад: Який ваш улюблений фреймворк?">
                            </div>
                            
                            <div class="mb-3" id="optionsContainer">
                                <label class="form-label fw-bold">Варіанти відповідей</label>
                                
                                <div class="input-group mb-2">
                                    <span class="input-group-text">1</span>
                                    <input type="text" class="form-control" placeholder="Введіть варіант відповіді">
                                    <button class="btn btn-outline-danger delete-btn" type="button">Видалити</button>
                                </div>
                                
                                <div class="input-group mb-2">
                                    <span class="input-group-text">2</span>
                                    <input type="text" class="form-control" placeholder="Введіть варіант відповіді">
                                    <button class="btn btn-outline-danger delete-btn" type="button">Видалити</button>
                                </div>
                            </div>
                            
                            <button type="button" id="addOptionBtn" class="btn btn-outline-secondary btn-sm mb-4">+ Додати ще варіант</button>

                            <div class="d-grid">
                                <button type="button" id="createSurveyBtn" class="btn btn-success btn-lg">Створити опитування</button>
                            </div>
                        </form>
                    </div>
                </div>

                <h3 class="mb-3">Мої активні опитування</h3>
                <div class="list-group" id="surveyList">
                    </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 SurveyMaker. Розроблено студенткою групи КВ-32 Чучвагою Анастасією.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        class SurveyModel {
            constructor() {
                const savedSurveys = localStorage.getItem('surveys');
                
                if (savedSurveys) {
                    this.surveys = JSON.parse(savedSurveys);
                } else {
                    this.surveys = [
                        {
                            id: 1,
                            question: "Яка ваша улюблена мова програмування?",
                            date: "20.05.2026",
                            optionsCount: 4,
                            answers: 12
                        }
                    ];
                    this._commit(this.surveys);
                }
            }

            _commit(surveys) {
                localStorage.setItem('surveys', JSON.stringify(surveys));
            }

            addSurvey(question, options) {
                const newSurvey = {
                    id: Date.now(),
                    question: question,
                    date: new Date().toLocaleDateString('uk-UA'),
                    optionsCount: options.length,
                    answers: 0
                };
                
                this.surveys.push(newSurvey);
                
                this._commit(this.surveys);
                
                return newSurvey;
            }

            getSurveys() {
                return this.surveys;
            }
        }

        class SurveyView {
            constructor() {
                this.questionInput = document.getElementById('questionInput');
                this.createBtn = document.getElementById('createSurveyBtn');
                this.surveyList = document.getElementById('surveyList');
                this.optionsContainer = document.getElementById('optionsContainer');
                this.addOptionBtn = document.getElementById('addOptionBtn');
                
                if (this.optionsContainer && this.addOptionBtn) {
                    this.initDynamicOptions();
                }

                this.getOptions = () => {
                    const optionInputs = this.optionsContainer.querySelectorAll('input[type="text"]');
                    return Array.from(optionInputs).map(input => input.value).filter(val => val.trim() !== '');
                };
            }

            initDynamicOptions() {
                this.addOptionBtn.addEventListener('click', () => {
                    const currentCount = this.optionsContainer.querySelectorAll('.input-group').length;
                    const newDiv = document.createElement('div');
                    newDiv.className = 'input-group mb-2';
                    
                    newDiv.innerHTML = `
                        <span class="input-group-text">${currentCount + 1}</span>
                        <input type="text" class="form-control" placeholder="Введіть варіант відповіді">
                        <button class="btn btn-outline-danger delete-btn" type="button">Видалити</button>
                    `;
                    
                    this.optionsContainer.appendChild(newDiv);
                });

                this.optionsContainer.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) {
                        const totalOptions = this.optionsContainer.querySelectorAll('.input-group').length;
                        
                        if (totalOptions > 2) {
                            e.target.closest('.input-group').remove();
                            this.updateOptionNumbers();
                        } else {
                            alert('Опитування повинно мати хоча б два варіанти відповіді!');
                        }
                    }
                });
            }

            updateOptionNumbers() {
                const groups = this.optionsContainer.querySelectorAll('.input-group');
                groups.forEach((group, index) => {
                    group.querySelector('.input-group-text').textContent = index + 1;
                });
            }

            bindAddSurvey(handler) {
                if (!this.createBtn) return;
                
                this.createBtn.addEventListener('click', () => {
                    const question = this.questionInput.value;
                    const options = this.getOptions();
                    
                    if (question.trim() !== '' && options.length >= 2) {
                        handler(question, options);
                    } else {
                        alert('Будь ласка, введіть запитання та мінімум два варіанти відповіді.');
                    }
                });
            }

            clearForm() {
                this.questionInput.value = '';
                const optionInputs = this.optionsContainer.querySelectorAll('input[type="text"]');
                optionInputs.forEach(input => input.value = '');
                
                const groups = this.optionsContainer.querySelectorAll('.input-group');
                for (let i = groups.length - 1; i >= 2; i--) {
                    groups[i].remove();
                }
            }

            displaySurveys(surveys) {
                if (!this.surveyList) return;
                
                this.surveyList.innerHTML = '';
                
                surveys.forEach(survey => {
                    const a = document.createElement('a');
                    a.href = '#';
                    a.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center mb-2 shadow-sm rounded';
                    
                    a.innerHTML = `
                        <div>
                            <h6 class="mb-1 fw-bold">${survey.question}</h6>
                            <small class="text-muted">Створено: ${survey.date} | Варіантів: ${survey.optionsCount}</small>
                        </div>
                        <span class="badge bg-primary rounded-pill">${survey.answers} відповідей</span>
                    `;
                    
                    this.surveyList.appendChild(a);
                });
            }
        }

        class SurveyController {
            constructor(model, view) {
                this.model = model;
                this.view = view;

                this.onSurveyListChanged(this.model.getSurveys());
                this.view.bindAddSurvey(this.handleAddSurvey.bind(this));
            }

            handleAddSurvey(question, options) {
                this.model.addSurvey(question, options);
                this.onSurveyListChanged(this.model.getSurveys());
                this.view.clearForm();
            }

            onSurveyListChanged(surveys) {
                this.view.displaySurveys(surveys);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = new SurveyController(new SurveyModel(), new SurveyView());
        });
    </script>
</body>
</html>
