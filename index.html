<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опитування - Головна сторінка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">SurveyMaker</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Головна</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="mb-4 text-center">Створення нового опитування</h1>
                
                <div class="card shadow-sm mb-5">
                    <div class="card-body">
                        <form>
                            <div class="mb-4">
                                <label for="questionInput" class="form-label fw-bold">Ваше запитання</label>
                                <input type="text" class="form-control form-control-lg" id="questionInput" placeholder="Наприклад: Який ваш улюблений фреймворк?">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Варіанти відповідей</label>
                                
                                <div class="input-group mb-2">
                                    <span class="input-group-text">1</span>
                                    <input type="text" class="form-control" placeholder="Введіть варіант відповіді">
                                    <button class="btn btn-outline-danger" type="button">Видалити</button>
                                </div>
                                
                                <div class="input-group mb-2">
                                    <span class="input-group-text">2</span>
                                    <input type="text" class="form-control" placeholder="Введіть варіант відповіді">
                                    <button class="btn btn-outline-danger" type="button">Видалити</button>
                                </div>
                            </div>
                            
                            <button type="button" class="btn btn-outline-secondary btn-sm mb-4">+ Додати ще варіант</button>

                            <div class="d-grid">
                                <button type="button" class="btn btn-success btn-lg">Створити опитування</button>
                            </div>
                        </form>
                    </div>
                </div>

                <h3 class="mb-3">Мої активні опитування</h3>
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1 fw-bold">Яка ваша улюблена мова програмування?</h6>
                            <small class="text-muted">Створено: 20.05.2026 | Варіантів: 4</small>
                        </div>
                        <span class="badge bg-primary rounded-pill">12 відповідей</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 SurveyMaker. Розроблено студенткою групи КВ-32 Чучвагою Анастасією.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
